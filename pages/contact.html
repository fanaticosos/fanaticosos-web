<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto — FanaticOSOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0B1F3A; --navy-card:#1a3558; --orange:#F07820; --white:#FFFFFF; --gray:#94a3b8; --gray-light:#cbd5e1; }
    body { background: var(--navy); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: repeating-linear-gradient(90deg, transparent, transparent 9.09%, rgba(255,255,255,0.018) 9.09%, rgba(255,255,255,0.018) 9.19%);
      pointer-events: none; z-index: 0;
    }
    .page-wrap { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 60px 24px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--gray); text-decoration: none; font-size: 13px; font-weight: 500; margin-bottom: 40px; transition: color 0.2s; }
    .back-link:hover { color: var(--orange); }
    .back-link svg { width: 14px; height: 14px; fill: currentColor; }
    .page-eyebrow { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 0.4em; color: var(--orange); margin-bottom: 8px; }
    .page-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 10vw, 64px); line-height: 0.95; margin-bottom: 32px; }
    .contact-card { background: var(--navy-card); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 32px; position: relative; overflow: hidden; }
    .contact-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--orange), #c45e10); }
    .contact-item { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .contact-item:last-child { border-bottom: none; }
    .contact-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(240,120,32,0.15); display: flex; align-items: center; justify-content: center; color: var(--orange); flex-shrink: 0; }
    .contact-icon svg { width: 18px; height: 18px; fill: currentColor; }
    .contact-label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); margin-bottom: 3px; }
    .contact-value a { color: var(--white); text-decoration: none; font-weight: 500; font-size: 15px; transition: color 0.2s; }
    .contact-value a:hover { color: var(--orange); }
    footer { position: relative; z-index: 1; border-top: 1px solid rgba(255,255,255,0.07); padding: 24px; text-align: center; font-size: 12px; color: var(--gray); margin-top: 60px; }
    footer a { color: var(--gray); text-decoration: none; margin: 0 10px; }
    footer a:hover { color: var(--orange); }
  </style>
</head>
<body>
